<svg width="280" height="64" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (64x64) -->
  <rect width="64" height="64" rx="14" fill="url(#iconBg)"/>

  <!-- QR corner — top left -->
  <rect x="6" y="6" width="18" height="18" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <rect x="10" y="10" width="10" height="10" rx="1.5" fill="white" opacity="0.9"/>

  <!-- QR corner — top right -->
  <rect x="40" y="6" width="18" height="18" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <rect x="44" y="10" width="10" height="10" rx="1.5" fill="white" opacity="0.9"/>

  <!-- QR corner — bottom left -->
  <rect x="6" y="40" width="18" height="18" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <rect x="10" y="44" width="10" height="10" rx="1.5" fill="white" opacity="0.9"/>

  <!-- C arc -->
  <path d="M 43 14 C 36 10 28 9 21 12 C 14 16 10 23 10 32 C 10 41 14 48 21 52 C 28 55 36 54 43 50"
    fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- AI nodes -->
  <line x1="46" y1="21" x2="50" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="50" y1="32" x2="46" y2="43" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <circle cx="46" cy="21" r="4" fill="white"/>
  <circle cx="50" cy="32" r="4" fill="white"/>
  <circle cx="46" cy="43" r="4" fill="white"/>
  <circle cx="46" cy="21" r="1.8" fill="#a78bfa"/>
  <circle cx="50" cy="32" r="1.8" fill="#a78bfa"/>
  <circle cx="46" cy="43" r="1.8" fill="#a78bfa"/>

  <!-- Wordmark: "Cadifys" -->
  <text x="80" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28" font-weight="700" fill="#1e1b4b" letter-spacing="-0.5">Cadifys</text>

  <!-- Wordmark: "AI" accent -->
  <text x="218" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
