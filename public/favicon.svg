<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle top-left shine -->
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- QR corner marker — top left -->
  <rect x="52" y="52" width="88" height="88" rx="14" fill="none" stroke="white" stroke-width="10" opacity="0.35"/>
  <rect x="76" y="76" width="40" height="40" rx="6" fill="white" opacity="0.9"/>

  <!-- QR corner marker — top right -->
  <rect x="372" y="52" width="88" height="88" rx="14" fill="none" stroke="white" stroke-width="10" opacity="0.35"/>
  <rect x="396" y="76" width="40" height="40" rx="6" fill="white" opacity="0.9"/>

  <!-- QR corner marker — bottom left -->
  <rect x="52" y="372" width="88" height="88" rx="14" fill="none" stroke="white" stroke-width="10" opacity="0.35"/>
  <rect x="76" y="396" width="40" height="40" rx="6" fill="white" opacity="0.9"/>

  <!-- Bold C arc -->
  <path d="M 340 162 C 294 126 234 122 184 146 C 134 170 104 210 104 256 C 104 302 134 342 184 366 C 234 390 294 386 340 350"
    fill="none" stroke="white" stroke-width="58" stroke-linecap="round"/>

  <!-- AI neural nodes — right side of C opening -->
  <!-- Connection lines (behind nodes) -->
  <line x1="366" y1="194" x2="392" y2="256" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="392" y1="256" x2="366" y2="318" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="366" y1="194" x2="366" y2="318" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.2"/>

  <!-- Node dots -->
  <circle cx="366" cy="194" r="22" fill="white"/>
  <circle cx="392" cy="256" r="22" fill="white"/>
  <circle cx="366" cy="318" r="22" fill="white"/>

  <!-- Inner glow dots -->
  <circle cx="366" cy="194" r="10" fill="#a78bfa"/>
  <circle cx="392" cy="256" r="10" fill="#a78bfa"/>
  <circle cx="366" cy="318" r="10" fill="#a78bfa"/>
</svg>
